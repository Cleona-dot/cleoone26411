<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cleoone26411</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;}
    .page{display:none;}
    .page.active{display:flex;}

    /* ══ 登录页 ══ */
    #loginPage{min-height:100vh;align-items:center;justify-content:center;}
    .login-card{padding:48px 40px;width:100%;max-width:460px;}
    .form-group{margin-bottom:12px;}
    label{display:block;font-size:17px;font-weight:500;color:#1d1d1f;margin-bottom:8px;}
    input[type=text],input[type=password]{width:100%;height:46px;background:#d4d4d4;border:none;border-radius:10px;padding:0 16px;font-size:15px;color:#1d1d1f;font-family:inherit;outline:none;transition:background .2s,box-shadow .2s;-webkit-appearance:none;}
    input[type=text]::placeholder,input[type=password]::placeholder{color:#8a8a8e;font-size:14px;}
    input[type=text]:focus,input[type=password]:focus{background:#cacaca;box-shadow:0 0 0 3px rgba(0,0,0,.08);}
    input.error-field{box-shadow:0 0 0 3px rgba(255,59,48,.2)!important;}
    .error-msg{display:none;margin-top:10px;font-size:13px;color:#ff3b30;}
    .error-msg.show{display:block;}
    .submit-btn{width:100%;height:48px;background:#1d1d1f;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:18px;transition:background .15s;position:relative;overflow:hidden;}
    .submit-btn:hover{background:#2d2d2f;}
    .submit-btn.loading{pointer-events:none;opacity:.7;}
    .submit-btn .btn-text{transition:opacity .2s;}
    .submit-btn .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
    .submit-btn.loading .btn-text{opacity:0;}
    .submit-btn.loading .spinner{display:block;}
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}

    /* ══ 首页 ══ */
    #homePage{min-height:100vh;align-items:center;justify-content:center;}
    .home-container{text-align:center;padding:48px 40px;max-width:500px;width:100%;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .site-name-home{font-family:'Dancing Script',cursive;font-size:48px;color:#1d1d1f;margin-bottom:40px;}
    .home-container h1{font-size:34px;font-weight:300;color:#1d1d1f;letter-spacing:-1px;line-height:1.25;margin-bottom:16px;}
    .home-container p{font-size:15px;color:#6e6e73;font-weight:300;line-height:1.7;margin-bottom:48px;}
    .start-btn{height:48px;padding:0 40px;background:#1d1d1f;color:white;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;transition:background .15s;}
    .start-btn:hover{background:#2d2d2f;}

    /* ══ 创作页 ══ */
    #workspacePage{flex-direction:column;min-height:100vh;}
    .ws-header{width:100%;background:#1d1d1f;height:52px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .ws-header-title{font-family:'Dancing Script',cursive;font-size:26px;color:white;}
    .ws-body{display:flex;flex:1;padding:24px 32px;gap:24px;align-items:stretch;}
    .ws-sidebar{display:flex;flex-direction:column;justify-content:space-between;flex-shrink:0;width:185px;}
    .category-btn{height:52px;background:#d4d4d4;border:none;border-radius:14px;font-size:14px;color:#1d1d1f;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s,transform .1s;padding:0 12px;}
    .category-btn:hover{background:#c8c8c8;}
    .category-btn:active{transform:scale(.97);}
    .category-btn .eng{font-family:'Dancing Script',cursive;font-size:16px;color:#6e6e73;}
    .ws-right{flex:1;display:flex;flex-direction:column;gap:8px;}
    .ws-preview-label{font-family:'Dancing Script',cursive;font-size:18px;color:#8a8a8e;text-align:right;}
    .ws-canvas{flex:1;background:white;border-radius:16px;border:1px solid #d0d0d0;position:relative;overflow:hidden;min-height:400px;user-select:none;}
    .canvas-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#c0c0c0;font-size:14px;pointer-events:none;}
    .canvas-item{position:absolute;cursor:move;}
    .canvas-item img{width:100%;height:100%;object-fit:fill;display:block;pointer-events:none;}
    .canvas-item.selected::before{content:'';position:absolute;inset:0;border:1px solid #1d1d1f;pointer-events:none;z-index:1;}
    .handle{position:absolute;width:8px;height:8px;background:white;border:1.5px solid #1d1d1f;border-radius:50%;display:none;z-index:2;}
    .canvas-item.selected .handle{display:block;}
    .handle.tl{top:-4px;left:-4px;cursor:nwse-resize;}
    .handle.tr{top:-4px;right:-4px;cursor:nesw-resize;}
    .handle.bl{bottom:-4px;left:-4px;cursor:nesw-resize;}
    .handle.br{bottom:-4px;right:-4px;cursor:nwse-resize;}
    .handle.tm{top:-4px;left:calc(50% - 4px);cursor:ns-resize;}
    .handle.bm{bottom:-4px;left:calc(50% - 4px);cursor:ns-resize;}
    .handle.ml{top:calc(50% - 4px);left:-4px;cursor:ew-resize;}
    .handle.mr{top:calc(50% - 4px);right:-4px;cursor:ew-resize;}
    .layer-toolbar{display:none;position:absolute;top:10px;right:10px;background:#1d1d1f;border-radius:10px;padding:6px 8px;gap:6px;flex-direction:column;z-index:1000;}
    .layer-toolbar.show{display:flex;}
    .layer-btn{width:30px;height:30px;background:rgba(255,255,255,.15);border:none;border-radius:7px;color:white;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .layer-btn:hover{background:rgba(255,255,255,.28);}
    .ws-footer{padding:18px 32px 26px;display:flex;justify-content:center;}
    .generate-btn{height:50px;padding:0 52px;background:#1d1d1f;color:white;border:none;border-radius:14px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;}
    .generate-btn:hover{background:#2d2d2f;}
    .footer-note{text-align:center;font-size:12px;color:#b0b0b5;padding-bottom:14px;}

    /* ══ 上传弹窗 ══ */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center;}
    .modal-overlay.show{display:flex;}
    .modal{background:#e8e8e8;border-radius:20px;padding:32px 32px 28px;width:420px;animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both;}
    .modal-title{font-size:18px;font-weight:600;color:#1d1d1f;margin-bottom:4px;}
    .modal-sub{font-size:13px;color:#6e6e73;margin-bottom:18px;}
    .photo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:18px;}
    .photo-cell{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:#d4d4d4;}
    .photo-cell img{width:100%;height:100%;object-fit:cover;}
    .photo-cell .cell-remove{position:absolute;top:3px;right:3px;width:16px;height:16px;background:rgba(0,0,0,.55);border-radius:50%;color:white;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .add-cell{aspect-ratio:1;border-radius:8px;background:#d4d4d4;border:2px dashed #b0b0b5;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
    .add-cell:hover{background:#c8c8c8;}
    .add-cell svg{width:22px;height:22px;stroke:#8a8a8e;fill:none;stroke-width:2;stroke-linecap:round;}
    .upload-input{display:none;}
    .modal-actions{display:flex;gap:12px;}
    .modal-cancel{flex:1;height:44px;background:#d4d4d4;border:none;border-radius:10px;font-size:15px;font-family:inherit;color:#1d1d1f;cursor:pointer;}
    .modal-cancel:hover{background:#c8c8c8;}
    .modal-confirm{flex:1;height:44px;background:#1d1d1f;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;color:white;cursor:pointer;}
    .modal-confirm:hover{background:#2d2d2f;}

    /* ══ 裁剪页（苹果风）══ */
    #cropPage{flex-direction:column;min-height:100vh;background:#1c1c1e;}

    .crop-topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 20px 8px;flex-shrink:0;
    }
    .crop-cancel{background:none;border:none;color:rgba(255,255,255,.75);font-size:16px;font-family:inherit;cursor:pointer;padding:6px 4px;}
    .crop-title{font-size:15px;font-weight:600;color:white;letter-spacing:-.2px;}
    .crop-done{background:none;border:none;color:#FFD60A;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;padding:6px 4px;}

    /* 图片+裁剪框区域 */
    .crop-stage{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:16px;position:relative;min-height:0;overflow:hidden;
    }
    .crop-img-wrap{position:relative;display:inline-block;line-height:0;flex-shrink:0;}
    #cropImg{display:block;max-width:100%;max-height:calc(100vh - 260px);user-select:none;pointer-events:none;}

    /* 裁剪框本体 */
    #cropBox{
      position:absolute;
      cursor:move;
      /* 用box-shadow做外部遮罩 */
      box-shadow:0 0 0 9999px rgba(0,0,0,.55);
    }
    /* 边框 */
    #cropBox::before{
      content:'';position:absolute;inset:0;
      border:1px solid rgba(255,255,255,.8);
      pointer-events:none;
    }
    /* 角落粗线 */
    .cc{position:absolute;width:20px;height:20px;pointer-events:none;}
    .cc.tl{top:0;left:0;border-top:3px solid #fff;border-left:3px solid #fff;}
    .cc.tr{top:0;right:0;border-top:3px solid #fff;border-right:3px solid #fff;}
    .cc.bl{bottom:0;left:0;border-bottom:3px solid #fff;border-left:3px solid #fff;}
    .cc.br{bottom:0;right:0;border-bottom:3px solid #fff;border-right:3px solid #fff;}
    /* 三等分线（拖动时显示）*/
    .cgrid{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .15s;}
    .cgrid.show{opacity:1;}
    .cgrid::before,.cgrid::after{content:'';position:absolute;background:rgba(255,255,255,.25);}
    .cgrid::before{left:33.33%;top:0;bottom:0;width:.5px;box-shadow:calc(33.33%) 0 0 rgba(255,255,255,.25);}
    .cgrid::after{top:33.33%;left:0;right:0;height:.5px;box-shadow:0 33.33% 0 rgba(255,255,255,.25);}

    /* 8方向透明手柄 */
    .ch{position:absolute;z-index:10;}
    .ch.tl{top:-12px;left:-12px;width:32px;height:32px;cursor:nwse-resize;}
    .ch.tr{top:-12px;right:-12px;width:32px;height:32px;cursor:nesw-resize;}
    .ch.bl{bottom:-12px;left:-12px;width:32px;height:32px;cursor:nesw-resize;}
    .ch.br{bottom:-12px;right:-12px;width:32px;height:32px;cursor:nwse-resize;}
    .ch.tm{top:-12px;left:calc(50% - 20px);width:40px;height:24px;cursor:ns-resize;}
    .ch.bm{bottom:-12px;left:calc(50% - 20px);width:40px;height:24px;cursor:ns-resize;}
    .ch.ml{left:-12px;top:calc(50% - 20px);width:24px;height:40px;cursor:ew-resize;}
    .ch.mr{right:-12px;top:calc(50% - 20px);width:24px;height:40px;cursor:ew-resize;}

    /* 比例滚动栏 */
    .crop-ratios{
      flex-shrink:0;padding:8px 0 4px;
      overflow-x:auto;scrollbar-width:none;
    }
    .crop-ratios::-webkit-scrollbar{display:none;}
    .ratio-row{display:flex;gap:2px;padding:0 16px;width:max-content;}

    .ratio-btn{
      display:flex;flex-direction:column;align-items:center;gap:7px;
      padding:8px 16px;border-radius:12px;border:none;background:none;
      cursor:pointer;color:rgba(255,255,255,.45);font-family:inherit;
      transition:color .15s,background .15s;min-width:64px;
    }
    .ratio-btn:hover{color:rgba(255,255,255,.7);}
    .ratio-btn.active{color:white;background:rgba(255,255,255,.1);}

    .r-icon{
      border:1.5px solid currentColor;border-radius:3px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:border-color .15s;
    }
    .r-icon.free-icon{width:22px;height:22px;border-style:dashed;}
    .r-icon.sq{width:22px;height:22px;}
    .r-icon.p916{width:14px;height:22px;}
    .r-icon.p169{width:22px;height:14px;}
    .r-icon.p34{width:16px;height:22px;}
    .r-icon.p43{width:22px;height:16px;}
    .r-icon.p45{width:17px;height:22px;}
    .r-icon.p54{width:22px;height:17px;}
    .r-icon.p53{width:22px;height:13px;}
    .r-icon.p35{width:13px;height:22px;}
    .r-icon.p23{width:16px;height:22px;}
    .r-icon.p32{width:22px;height:16px;}

    .r-label{font-size:11px;font-weight:500;white-space:nowrap;letter-spacing:.1px;}

    /* 底部按钮 */
    .crop-footer{
      display:flex;justify-content:center;gap:16px;
      padding:12px 24px 28px;flex-shrink:0;
    }
    .cfbtn{height:46px;padding:0 32px;border:none;border-radius:14px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;transition:background .15s,transform .1s;}
    .cfbtn:active{transform:scale(.97);}
    .cfbtn.cancel{background:rgba(255,255,255,.1);color:white;}
    .cfbtn.cancel:hover{background:rgba(255,255,255,.18);}
    .cfbtn.save{background:white;color:#1c1c1e;font-weight:600;}
    .cfbtn.save:hover{background:#f0f0f0;}
  </style>
</head>
<body>

<!-- 登录页 -->
<div class="page active" id="loginPage">
  <div class="login-card">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="账号" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="密码" autocomplete="current-password"/>
    </div>
    <div class="error-msg" id="errorMsg">账号或密码错误，请重试</div>
    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
      <span class="btn-text">Submit</span>
      <div class="spinner"></div>
    </button>
  </div>
</div>

<!-- 首页 -->
<div class="page" id="homePage">
  <div class="home-container">
    <div class="site-name-home">Cleoone26411</div>
    <h1>你的专属<br>穿搭创作台</h1>
    <p>上传服装图片，一键去背景<br>自由排版，生成你的穿搭图</p>
    <button class="start-btn" onclick="showPage('workspacePage')">开始创作</button>
  </div>
</div>

<!-- 创作页 -->
<div class="page" id="workspacePage">
  <div class="ws-header"><span class="ws-header-title">Cleoone26411</span></div>
  <div class="ws-body">
    <div class="ws-sidebar">
      <button class="category-btn" onclick="openModal('上装')"><span class="eng">Tops</span> 上装</button>
      <button class="category-btn" onclick="openModal('下装')"><span class="eng">Bottoms</span> 下装</button>
      <button class="category-btn" onclick="openModal('鞋子')"><span class="eng">Shoes</span> 鞋子</button>
      <button class="category-btn" onclick="openModal('袜子')"><span class="eng">Socks</span> 袜子</button>
      <button class="category-btn" onclick="openModal('包包')"><span class="eng">Bags</span> 包包</button>
      <button class="category-btn" onclick="openModal('首饰')"><span class="eng">Accessories</span> 首饰</button>
    </div>
    <div class="ws-right">
      <div class="ws-preview-label">Preview Workspace 预览工作区</div>
      <div class="ws-canvas" id="wsCanvas" onclick="handleCanvasClick(event)">
        <div class="canvas-empty" id="canvasEmpty">上传服装后将在这里显示</div>
        <div class="layer-toolbar" id="layerToolbar">
          <button class="layer-btn" onclick="layerUp()">↑</button>
          <button class="layer-btn" onclick="layerDown()">↓</button>
          <button class="layer-btn" onclick="deleteSelected()">✕</button>
        </div>
      </div>
    </div>
  </div>
  <div class="ws-footer">
    <button class="generate-btn" onclick="generateOutfit()">生成作品</button>
  </div>
  <div class="footer-note">Cleoone26411 · All rights reserved</div>
</div>

<!-- 裁剪页 -->
<div class="page" id="cropPage">
  <div class="crop-topbar">
    <button class="crop-cancel" onclick="showPage('workspacePage')">取消</button>
    <span class="crop-title">裁剪</span>
    <button class="crop-done" onclick="saveCrop()">完成</button>
  </div>

  <div class="crop-stage" id="cropStage">
    <div class="crop-img-wrap" id="cropWrap">
      <img id="cropImg" draggable="false"/>
      <div id="cropBox">
        <div class="cc tl"></div><div class="cc tr"></div>
        <div class="cc bl"></div><div class="cc br"></div>
        <div class="cgrid" id="cgrid"></div>
        <div class="ch tl" data-d="tl"></div>
        <div class="ch tr" data-d="tr"></div>
        <div class="ch bl" data-d="bl"></div>
        <div class="ch br" data-d="br"></div>
        <div class="ch tm" data-d="tm"></div>
        <div class="ch bm" data-d="bm"></div>
        <div class="ch ml" data-d="ml"></div>
        <div class="ch mr" data-d="mr"></div>
      </div>
    </div>
  </div>

  <!-- 比例选择 -->
  <div class="crop-ratios">
    <div class="ratio-row" id="ratioRow">
      <button class="ratio-btn active" onclick="applyRatio(this,0)">
        <div class="r-icon free-icon"></div><span class="r-label">自由</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,'orig')">
        <div class="r-icon sq"></div><span class="r-label">原始比例</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,1)">
        <div class="r-icon sq"></div><span class="r-label">1:1</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,9/16)">
        <div class="r-icon p916"></div><span class="r-label">9:16</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,16/9)">
        <div class="r-icon p169"></div><span class="r-label">16:9</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,3/4)">
        <div class="r-icon p34"></div><span class="r-label">3:4</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,4/3)">
        <div class="r-icon p43"></div><span class="r-label">4:3</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,4/5)">
        <div class="r-icon p45"></div><span class="r-label">4:5</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,5/4)">
        <div class="r-icon p54"></div><span class="r-label">5:4</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,3/5)">
        <div class="r-icon p35"></div><span class="r-label">3:5</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,5/3)">
        <div class="r-icon p53"></div><span class="r-label">5:3</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,2/3)">
        <div class="r-icon p23"></div><span class="r-label">2:3</span>
      </button>
      <button class="ratio-btn" onclick="applyRatio(this,3/2)">
        <div class="r-icon p32"></div><span class="r-label">3:2</span>
      </button>
    </div>
  </div>

  <div class="crop-footer">
    <button class="cfbtn cancel" onclick="showPage('workspacePage')">取消</button>
    <button class="cfbtn save" onclick="saveCrop()">保存图片</button>
  </div>
</div>

<!-- 上传弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">上传图片</div>
    <div class="modal-sub">点击 + 上传图片，支持多张</div>
    <div class="photo-grid" id="photoGrid"></div>
    <input type="file" id="uploadInput" class="upload-input" accept="image/*" multiple onchange="handleUpload(event)"/>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-confirm" onclick="confirmUpload()">完成</button>
    </div>
  </div>
</div>

<script>
  let currentCategory='', currentUploaded=[], selectedItem=null, zCounter=10;
  let generatedDataUrl='', origNatW=0, origNatH=0;
  let activeRatio=0; // 0=free, 'orig', or number

  /* 页面切换 */
  function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  /* 登录 */
  function handleLogin(){
    const u=document.getElementById('username').value.trim();
    const p=document.getElementById('password').value.trim();
    const err=document.getElementById('errorMsg');
    const btn=document.getElementById('loginBtn');
    const uEl=document.getElementById('username'), pEl=document.getElementById('password');
    err.classList.remove('show'); uEl.classList.remove('error-field'); pEl.classList.remove('error-field');
    if(u==='cleoone'&&p==='iveheardofher'){
      btn.classList.add('loading');
      setTimeout(()=>{btn.classList.remove('loading');showPage('homePage');},800);
    } else {
      uEl.classList.add('error-field'); pEl.classList.add('error-field'); err.classList.add('show');
      setTimeout(()=>{uEl.classList.remove('error-field');pEl.classList.remove('error-field');},2000);
    }
  }

  /* 上传弹窗 */
  function openModal(cat){
    currentCategory=cat; currentUploaded=[];
    document.getElementById('modalTitle').textContent=cat+' — 上传图片';
    renderGrid(); document.getElementById('modalOverlay').classList.add('show');
  }
  function closeModal(){document.getElementById('modalOverlay').classList.remove('show'); document.getElementById('uploadInput').value='';}
  function renderGrid(){
    const grid=document.getElementById('photoGrid'); grid.innerHTML='';
    const add=document.createElement('div'); add.className='add-cell';
    add.onclick=()=>document.getElementById('uploadInput').click();
    add.innerHTML=`<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    grid.appendChild(add);
    currentUploaded.forEach((item,i)=>{
      const cell=document.createElement('div'); cell.className='photo-cell';
      cell.innerHTML=`<img src="${item.dataUrl}"/><div class="cell-remove" onclick="removePhoto(${i})">×</div>`;
      grid.appendChild(cell);
    });
  }
  function removePhoto(i){currentUploaded.splice(i,1); renderGrid();}
  function handleUpload(e){
    Array.from(e.target.files).forEach(f=>{
      const r=new FileReader();
      r.onload=ev=>{currentUploaded.push({dataUrl:ev.target.result}); renderGrid();};
      r.readAsDataURL(f);
    }); e.target.value='';
  }
  function confirmUpload(){
    if(!currentUploaded.length){alert('请先上传至少一张图片！');return;}
    currentUploaded.forEach(item=>addToCanvas(item.dataUrl)); closeModal();
  }

  /* 画布 */
  function addToCanvas(src){
    const canvas=document.getElementById('wsCanvas');
    document.getElementById('canvasEmpty').style.display='none';
    const el=document.createElement('div'); el.className='canvas-item';
    const tmp=new Image();
    tmp.onload=()=>{
      let w=160,h=160,r=tmp.naturalWidth/tmp.naturalHeight;
      if(r>1)h=Math.round(w/r); else w=Math.round(h*r);
      el.style.cssText=`width:${w}px;height:${h}px;left:${Math.random()*(canvas.offsetWidth-w-20)+10}px;top:${Math.random()*(canvas.offsetHeight-h-20)+10}px;z-index:${zCounter++};`;
      el.innerHTML=`<img src="${src}" draggable="false"/>
        <div class="handle tl"></div><div class="handle tr"></div>
        <div class="handle bl"></div><div class="handle br"></div>
        <div class="handle tm"></div><div class="handle bm"></div>
        <div class="handle ml"></div><div class="handle mr"></div>`;
      makeDraggable(el); makeResizable(el);
      el.addEventListener('mousedown',e=>{if(e.target.classList.contains('handle'))return; e.stopPropagation(); selectItem(el);});
      canvas.appendChild(el);
    }; tmp.src=src;
  }
  function makeDraggable(el){
    el.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('handle'))return;
      e.preventDefault(); selectItem(el);
      const sx=e.clientX-el.offsetLeft, sy=e.clientY-el.offsetTop;
      const cv=document.getElementById('wsCanvas');
      const mv=ev=>{
        el.style.left=Math.max(0,Math.min(ev.clientX-sx,cv.offsetWidth-el.offsetWidth))+'px';
        el.style.top=Math.max(0,Math.min(ev.clientY-sy,cv.offsetHeight-el.offsetHeight))+'px';
      };
      const up=()=>{document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up);};
      document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
    });
  }
  function makeResizable(el){
    el.querySelectorAll('.handle').forEach(h=>{
      h.addEventListener('mousedown',e=>{
        e.preventDefault(); e.stopPropagation(); selectItem(el);
        const sx=e.clientX,sy=e.clientY,sw=el.offsetWidth,sh=el.offsetHeight,sl=el.offsetLeft,st=el.offsetTop;
        const d=[...h.classList][1];
        const mv=ev=>{
          const dx=ev.clientX-sx, dy=ev.clientY-sy;
          let nw=sw,nh=sh,nl=sl,nt=st;
          if(d==='br'){nw=Math.max(30,sw+dx);nh=Math.max(30,sh+dy);}
          else if(d==='bl'){nw=Math.max(30,sw-dx);nl=sl+sw-nw;nh=Math.max(30,sh+dy);}
          else if(d==='tr'){nw=Math.max(30,sw+dx);nh=Math.max(30,sh-dy);nt=st+sh-nh;}
          else if(d==='tl'){nw=Math.max(30,sw-dx);nl=sl+sw-nw;nh=Math.max(30,sh-dy);nt=st+sh-nh;}
          else if(d==='mr'){nw=Math.max(30,sw+dx);}
          else if(d==='ml'){nw=Math.max(30,sw-dx);nl=sl+sw-nw;}
          else if(d==='bm'){nh=Math.max(30,sh+dy);}
          else if(d==='tm'){nh=Math.max(30,sh-dy);nt=st+sh-nh;}
          el.style.width=nw+'px'; el.style.height=nh+'px';
          el.style.left=nl+'px'; el.style.top=nt+'px';
        };
        const up=()=>{document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up);};
        document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
      });
    });
  }
  function selectItem(el){
    if(selectedItem)selectedItem.classList.remove('selected');
    selectedItem=el; el.classList.add('selected'); el.style.zIndex=zCounter++;
    document.getElementById('layerToolbar').classList.add('show');
  }
  function handleCanvasClick(e){
    if(e.target===document.getElementById('wsCanvas')||e.target===document.getElementById('canvasEmpty'))deselectAll();
  }
  function deselectAll(){
    if(selectedItem){selectedItem.classList.remove('selected'); selectedItem=null;}
    document.getElementById('layerToolbar').classList.remove('show');
  }
  function layerUp(){if(selectedItem)selectedItem.style.zIndex=zCounter++;}
  function layerDown(){if(selectedItem){const z=parseInt(selectedItem.style.zIndex)||10; selectedItem.style.zIndex=Math.max(1,z-2);}}
  function deleteSelected(){
    if(!selectedItem)return;
    selectedItem.remove(); selectedItem=null;
    document.getElementById('layerToolbar').classList.remove('show');
    if(!document.getElementById('wsCanvas').querySelector('.canvas-item'))
      document.getElementById('canvasEmpty').style.display='flex';
  }

  /* 生成作品 → 裁剪页 */
  async function generateOutfit(){
    const canvas=document.getElementById('wsCanvas');
    const items=canvas.querySelectorAll('.canvas-item');
    if(!items.length){alert('请先上传服装图片！');return;}
    const prev=selectedItem; deselectAll();
    const w=canvas.offsetWidth, h=canvas.offsetHeight;
    const off=document.createElement('canvas'); off.width=w; off.height=h;
    const ctx=off.getContext('2d');
    ctx.fillStyle='white'; ctx.fillRect(0,0,w,h);
    const sorted=Array.from(items).sort((a,b)=>(parseInt(a.style.zIndex)||0)-(parseInt(b.style.zIndex)||0));
    for(const item of sorted){
      await new Promise(res=>{
        const img=new Image();
        img.onload=()=>{ctx.drawImage(img,item.offsetLeft,item.offsetTop,item.offsetWidth,item.offsetHeight);res();};
        img.onerror=res; img.src=item.querySelector('img').src;
      });
    }
    generatedDataUrl=off.toDataURL('image/png');
    origNatW=w; origNatH=h;
    if(prev)selectItem(prev);
    enterCrop();
  }

  /* 进入裁剪 */
  function enterCrop(){
    showPage('cropPage');
    // 重置比例按钮
    document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.ratio-btn').classList.add('active');
    activeRatio=0;
    const img=document.getElementById('cropImg');
    img.onload=()=>{ setTimeout(initCropBox,50); };
    img.src=generatedDataUrl;
  }

  /* 初始化裁剪框 */
  function initCropBox(){
    const img=document.getElementById('cropImg');
    const iw=img.offsetWidth, ih=img.offsetHeight;
    const bw=Math.round(iw*0.85), bh=Math.round(ih*0.85);
    setCropBox(Math.round((iw-bw)/2), Math.round((ih-bh)/2), bw, bh);
    setupCropDrag();
  }

  /* 设置裁剪框位置和尺寸 */
  function setCropBox(x,y,w,h){
    const box=document.getElementById('cropBox');
    box.style.left=x+'px'; box.style.top=y+'px';
    box.style.width=w+'px'; box.style.height=h+'px';
  }
  function getCropBox(){
    const box=document.getElementById('cropBox');
    return {x:box.offsetLeft, y:box.offsetTop, w:box.offsetWidth, h:box.offsetHeight};
  }

  /* 拖动和缩放裁剪框 */
  function setupCropDrag(){
    const box=document.getElementById('cropBox');
    const img=document.getElementById('cropImg');
    const grid=document.getElementById('cgrid');

    // 拖动框体
    box.addEventListener('mousedown',e=>{
      if(e.target!==box&&!e.target.classList.contains('cc')&&!e.target.classList.contains('cgrid'))return;
      e.preventDefault();
      grid.classList.add('show');
      const {x,y}=getCropBox();
      const sx=e.clientX-x, sy=e.clientY-y;
      const mv=ev=>{
        const iw=img.offsetWidth, ih=img.offsetHeight;
        const {w,h}=getCropBox();
        const nx=Math.max(0,Math.min(ev.clientX-sx,iw-w));
        const ny=Math.max(0,Math.min(ev.clientY-sy,ih-h));
        setCropBox(nx,ny,w,h);
      };
      const up=()=>{grid.classList.remove('show'); document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up);};
      document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
    });

    // 8方向手柄
    box.querySelectorAll('.ch').forEach(ch=>{
      ch.addEventListener('mousedown',e=>{
        e.preventDefault(); e.stopPropagation();
        grid.classList.add('show');
        const d=ch.dataset.d;
        const {x:sx0,y:sy0,w:sw,h:sh}=getCropBox();
        const mx=e.clientX, my=e.clientY;
        const iw=img.offsetWidth, ih=img.offsetHeight;
        const mv=ev=>{
          const dx=ev.clientX-mx, dy=ev.clientY-my;
          let nx=sx0,ny=sy0,nw=sw,nh=sh;
          if(d==='br'){nw=Math.max(40,sw+dx);nh=applyRatioCalc(nw,sh+dy);}
          else if(d==='bl'){nw=Math.max(40,sw-dx);nx=sx0+sw-nw;nh=applyRatioCalc(nw,sh+dy);}
          else if(d==='tr'){nw=Math.max(40,sw+dx);nh=applyRatioCalc(nw,sh-dy);ny=sy0+sh-nh;}
          else if(d==='tl'){nw=Math.max(40,sw-dx);nx=sx0+sw-nw;nh=applyRatioCalc(nw,sh-dy);ny=sy0+sh-nh;}
          else if(d==='mr'){nw=Math.max(40,sw+dx);}
          else if(d==='ml'){nw=Math.max(40,sw-dx);nx=sx0+sw-nw;}
          else if(d==='bm'){nh=Math.max(40,sh+dy);}
          else if(d==='tm'){nh=Math.max(40,sh-dy);ny=sy0+sh-nh;}
          // 边界
          nx=Math.max(0,nx); ny=Math.max(0,ny);
          nw=Math.min(nw,iw-nx); nh=Math.min(nh,ih-ny);
          setCropBox(nx,ny,nw,nh);
        };
        const up=()=>{grid.classList.remove('show'); document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up);};
        document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
      });
    });
  }

  function applyRatioCalc(nw, rawNh){
    if(activeRatio===0)return Math.max(40,rawNh);
    if(activeRatio==='orig')return Math.round(nw*(origNatH/origNatW));
    return Math.max(40,Math.round(nw/activeRatio));
  }

  /* 比例按钮 */
  function applyRatio(btn, ratio){
    document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeRatio=ratio;
    if(ratio===0)return; // 自由，不调整
    const img=document.getElementById('cropImg');
    const iw=img.offsetWidth, ih=img.offsetHeight;
    const {x,y,w}=getCropBox();
    let r=ratio==='orig'?(origNatW/origNatH):ratio;
    let nw=w, nh=Math.round(nw/r);
    if(nh>ih){nh=ih; nw=Math.round(nh*r);}
    if(nw>iw){nw=iw; nh=Math.round(nw/r);}
    // 居中
    const nx=Math.max(0,Math.min(x,iw-nw));
    const ny=Math.max(0,Math.min(y,ih-nh));
    setCropBox(nx,ny,nw,nh);
  }

  /* 保存裁剪结果 — 保存为真正的 PNG 图片文件 */
  function saveCrop(){
    const img=document.getElementById('cropImg');
    const box=document.getElementById('cropBox');
    // 显示尺寸 → 原始像素的缩放比
    const scaleX=origNatW/img.offsetWidth;
    const scaleY=origNatH/img.offsetHeight;
    const cx=Math.round(box.offsetLeft*scaleX);
    const cy=Math.round(box.offsetTop*scaleY);
    const cw=Math.round(box.offsetWidth*scaleX);
    const ch=Math.round(box.offsetHeight*scaleY);

    const off=document.createElement('canvas');
    off.width=cw; off.height=ch;
    const ctx=off.getContext('2d');
    const src=new Image();
    src.onload=()=>{
      ctx.drawImage(src, cx, cy, cw, ch, 0, 0, cw, ch);
      // 转成 Blob 再下载，这样保存出来就是普通 PNG 图片文件
      off.toBlob(blob=>{
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;
        a.download='Cleoone26411_穿搭.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      },'image/png');
    };
    src.src=generatedDataUrl;
  }

  /* 键盘 */
  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&document.getElementById('loginPage').classList.contains('active'))handleLogin();
    if(e.key==='Escape'){closeModal(); deselectAll();}
    if((e.key==='Delete'||e.key==='Backspace')&&selectedItem&&!document.getElementById('modalOverlay').classList.contains('show'))deleteSelected();
  });
</script>
