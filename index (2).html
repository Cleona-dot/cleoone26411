<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Cleoone26411</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;overflow-x:hidden;}
    .page{display:none;}
    .page.active{display:flex;}

    /* ══ 登录页 ══ */
    #loginPage{min-height:100vh;align-items:center;justify-content:center;}
    .login-card{padding:48px 32px;width:100%;max-width:420px;}
    .form-group{margin-bottom:12px;}
    label{display:block;font-size:17px;font-weight:500;color:#1d1d1f;margin-bottom:8px;}
    input[type=text],input[type=password]{width:100%;height:46px;background:#d4d4d4;border:none;border-radius:10px;padding:0 16px;font-size:15px;color:#1d1d1f;font-family:inherit;outline:none;transition:background .2s,box-shadow .2s;-webkit-appearance:none;}
    input[type=text]::placeholder,input[type=password]::placeholder{color:#8a8a8e;font-size:14px;}
    input[type=text]:focus,input[type=password]:focus{background:#cacaca;box-shadow:0 0 0 3px rgba(0,0,0,.08);}
    input.error-field{box-shadow:0 0 0 3px rgba(255,59,48,.2)!important;}
    .error-msg{display:none;margin-top:10px;font-size:13px;color:#ff3b30;}
    .error-msg.show{display:block;}
    .submit-btn{width:100%;height:48px;background:#1d1d1f;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:18px;position:relative;overflow:hidden;}
    .submit-btn.loading{pointer-events:none;opacity:.7;}
    .submit-btn .btn-text{transition:opacity .2s;}
    .submit-btn .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
    .submit-btn.loading .btn-text{opacity:0;}
    .submit-btn.loading .spinner{display:block;}
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}

    /* ══ 首页 ══ */
    #homePage{min-height:100vh;align-items:center;justify-content:center;}
    .home-container{text-align:center;padding:48px 32px;max-width:500px;width:100%;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .site-name-home{font-family:'Dancing Script',cursive;font-size:48px;color:#1d1d1f;margin-bottom:40px;}
    .home-container h1{font-size:32px;font-weight:300;color:#1d1d1f;letter-spacing:-1px;line-height:1.25;margin-bottom:16px;}
    .home-container p{font-size:15px;color:#6e6e73;font-weight:300;line-height:1.7;margin-bottom:48px;}
    .start-btn{height:48px;padding:0 40px;background:#1d1d1f;color:white;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;}

    /* ══ 创作页 ══ */
    #workspacePage{flex-direction:column;min-height:100vh;}
    .ws-header{width:100%;background:#1d1d1f;height:52px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .ws-header-title{font-family:'Dancing Script',cursive;font-size:26px;color:white;}
    .ws-body{display:flex;flex:1;padding:16px;gap:16px;align-items:stretch;}
    .ws-sidebar{display:flex;flex-direction:column;justify-content:space-between;flex-shrink:0;width:160px;}
    .category-btn{height:48px;background:#d4d4d4;border:none;border-radius:12px;font-size:13px;color:#1d1d1f;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:background .15s;padding:0 10px;}
    .category-btn:active{background:#c8c8c8;transform:scale(.97);}
    .category-btn .eng{font-family:'Dancing Script',cursive;font-size:15px;color:#6e6e73;}
    .ws-right{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;}
    .ws-preview-label{font-family:'Dancing Script',cursive;font-size:16px;color:#8a8a8e;text-align:right;}
    .ws-canvas{flex:1;background:white;border-radius:16px;border:1px solid #d0d0d0;position:relative;overflow:hidden;min-height:300px;touch-action:none;}
    .canvas-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#c0c0c0;font-size:13px;pointer-events:none;text-align:center;padding:20px;}
    .canvas-item{position:absolute;cursor:move;touch-action:none;}
    .canvas-item img{width:100%;height:100%;object-fit:fill;display:block;pointer-events:none;}
    .canvas-item.selected::before{content:'';position:absolute;inset:0;border:1px solid #1d1d1f;pointer-events:none;z-index:1;}
    .handle{position:absolute;width:10px;height:10px;background:#1d1d1f;border-radius:50%;display:none;z-index:2;touch-action:none;}
    .handle.edge{background:white;border:1.5px solid #1d1d1f;}
    .canvas-item.selected .handle{display:block;}
    .handle.tl{top:-5px;left:-5px;cursor:nwse-resize;}
    .handle.tr{top:-5px;right:-5px;cursor:nesw-resize;}
    .handle.bl{bottom:-5px;left:-5px;cursor:nesw-resize;}
    .handle.br{bottom:-5px;right:-5px;cursor:nwse-resize;}
    .handle.tm{top:-5px;left:calc(50% - 5px);cursor:ns-resize;}
    .handle.bm{bottom:-5px;left:calc(50% - 5px);cursor:ns-resize;}
    .handle.ml{top:calc(50% - 5px);left:-5px;cursor:ew-resize;}
    .handle.mr{top:calc(50% - 5px);right:-5px;cursor:ew-resize;}
    .layer-toolbar{display:none;position:absolute;top:10px;right:10px;background:#1d1d1f;border-radius:10px;padding:6px 8px;gap:6px;flex-direction:column;z-index:1000;}
    .layer-toolbar.show{display:flex;}
    .layer-btn{width:30px;height:30px;background:rgba(255,255,255,.15);border:none;border-radius:7px;color:white;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .ws-footer{padding:14px 16px 24px;display:flex;justify-content:center;}
    .generate-btn{height:50px;padding:0 48px;background:#1d1d1f;color:white;border:none;border-radius:14px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;}
    .footer-note{text-align:center;font-size:12px;color:#b0b0b5;padding-bottom:14px;}

    @media(max-width:600px){
      .ws-body{flex-direction:column;padding:12px;gap:12px;}
      .ws-sidebar{flex-direction:row;width:100%;gap:8px;order:2;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
      .ws-sidebar::-webkit-scrollbar{display:none;}
      .category-btn{flex-shrink:0;height:44px;min-width:76px;font-size:11px;flex-direction:column;gap:2px;padding:6px 8px;}
      .category-btn .eng{font-size:13px;}
      .ws-right{order:1;flex:none;}
      .ws-canvas{min-height:calc(100vw - 24px);max-height:calc(100vw - 24px);}
      .generate-btn{height:46px;padding:0 36px;font-size:15px;}
      .ws-footer{padding:12px 16px 20px;}
    }

    /* ══ 上传弹窗 ══ */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:16px;}
    .modal-overlay.show{display:flex;}
    .modal{background:#e8e8e8;border-radius:20px;padding:28px 28px 24px;width:100%;max-width:400px;animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both;}
    .modal-title{font-size:17px;font-weight:600;color:#1d1d1f;margin-bottom:3px;}
    .modal-sub{font-size:12px;color:#6e6e73;margin-bottom:16px;}
    .photo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:16px;}
    .photo-cell{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:#d4d4d4;}
    .photo-cell img{width:100%;height:100%;object-fit:cover;}
    .photo-cell .cell-remove{position:absolute;top:3px;right:3px;width:16px;height:16px;background:rgba(0,0,0,.55);border-radius:50%;color:white;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .add-cell{aspect-ratio:1;border-radius:8px;background:#d4d4d4;border:2px dashed #b0b0b5;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .add-cell:active{background:#c8c8c8;}
    .add-cell svg{width:20px;height:20px;stroke:#8a8a8e;fill:none;stroke-width:2;stroke-linecap:round;}
    .upload-input{display:none;}
    .ai-progress{display:none;margin-bottom:14px;padding:12px 14px;background:#d4d4d4;border-radius:12px;}
    .ai-progress.show{display:block;}
    .ai-progress-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .ai-spinner{width:15px;height:15px;border:2px solid rgba(0,0,0,.15);border-top-color:#1d1d1f;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
    .ai-progress-text{font-size:12px;color:#1d1d1f;font-weight:500;}
    .progress-bar-wrap{height:3px;background:rgba(0,0,0,.1);border-radius:2px;overflow:hidden;}
    .progress-bar{height:100%;background:#1d1d1f;border-radius:2px;width:0%;transition:width .3s;}
    .modal-actions{display:flex;gap:10px;}
    .modal-cancel{flex:1;height:42px;background:#d4d4d4;border:none;border-radius:10px;font-size:14px;font-family:inherit;color:#1d1d1f;cursor:pointer;}
    .modal-confirm{flex:1;height:42px;background:#1d1d1f;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;color:white;cursor:pointer;}
    .modal-confirm:disabled{opacity:.5;pointer-events:none;}

    /* ══ 裁剪页 ══ */
    #cropPage{flex-direction:column;min-height:100vh;background:#1c1c1e;}
    .crop-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px;flex-shrink:0;}
    .crop-cancel{background:none;border:none;color:rgba(255,255,255,.75);font-size:16px;font-family:inherit;cursor:pointer;padding:6px 4px;}
    .crop-title{font-size:15px;font-weight:600;color:white;}
    .crop-done{background:none;border:none;color:#FFD60A;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;padding:6px 4px;}
    .crop-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;min-height:0;overflow:hidden;}
    .crop-img-wrap{position:relative;display:inline-block;line-height:0;flex-shrink:0;}
    #cropImg{display:block;max-width:100%;max-height:calc(100vh - 220px);user-select:none;pointer-events:none;}
    #cropBox{position:absolute;cursor:move;box-shadow:0 0 0 9999px rgba(0,0,0,.55);}
    #cropBox::before{content:'';position:absolute;inset:0;border:1px solid rgba(255,255,255,.8);pointer-events:none;}
    .cc{position:absolute;width:20px;height:20px;pointer-events:none;}
    .cc.tl{top:0;left:0;border-top:3px solid #fff;border-left:3px solid #fff;}
    .cc.tr{top:0;right:0;border-top:3px solid #fff;border-right:3px solid #fff;}
    .cc.bl{bottom:0;left:0;border-bottom:3px solid #fff;border-left:3px solid #fff;}
    .cc.br{bottom:0;right:0;border-bottom:3px solid #fff;border-right:3px solid #fff;}
    .cgrid{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .15s;}
    .cgrid.show{opacity:1;}
    .cgrid::before,.cgrid::after{content:'';position:absolute;background:rgba(255,255,255,.25);}
    .cgrid::before{left:33.33%;top:0;bottom:0;width:.5px;box-shadow:calc(33.33%) 0 0 rgba(255,255,255,.25);}
    .cgrid::after{top:33.33%;left:0;right:0;height:.5px;box-shadow:0 33.33% 0 rgba(255,255,255,.25);}
    .ch{position:absolute;z-index:10;}
    .ch.tl{top:-12px;left:-12px;width:32px;height:32px;cursor:nwse-resize;}
    .ch.tr{top:-12px;right:-12px;width:32px;height:32px;cursor:nesw-resize;}
    .ch.bl{bottom:-12px;left:-12px;width:32px;height:32px;cursor:nesw-resize;}
    .ch.br{bottom:-12px;right:-12px;width:32px;height:32px;cursor:nwse-resize;}
    .ch.tm{top:-12px;left:calc(50% - 20px);width:40px;height:24px;cursor:ns-resize;}
    .ch.bm{bottom:-12px;left:calc(50% - 20px);width:40px;height:24px;cursor:ns-resize;}
    .ch.ml{left:-12px;top:calc(50% - 20px);width:24px;height:40px;cursor:ew-resize;}
    .ch.mr{right:-12px;top:calc(50% - 20px);width:24px;height:40px;cursor:ew-resize;}
    .crop-ratios{flex-shrink:0;padding:8px 0 4px;overflow-x:auto;scrollbar-width:none;}
    .crop-ratios::-webkit-scrollbar{display:none;}
    .ratio-row{display:flex;gap:2px;padding:0 16px;width:max-content;}
    .ratio-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 12px;border-radius:12px;border:none;background:none;cursor:pointer;color:rgba(255,255,255,.45);font-family:inherit;min-width:56px;}
    .ratio-btn.active{color:white;background:rgba(255,255,255,.1);}
    .r-icon{border:1.5px solid currentColor;border-radius:3px;}
    .r-icon.free-icon{width:22px;height:22px;border-style:dashed;}
    .r-icon.sq{width:22px;height:22px;}
    .r-icon.p916{width:14px;height:22px;}
    .r-icon.p169{width:22px;height:14px;}
    .r-icon.p34{width:16px;height:22px;}
    .r-icon.p43{width:22px;height:16px;}
    .r-icon.p45{width:17px;height:22px;}
    .r-icon.p54{width:22px;height:17px;}
    .r-icon.p53{width:22px;height:13px;}
    .r-icon.p35{width:13px;height:22px;}
    .r-icon.p23{width:16px;height:22px;}
    .r-icon.p32{width:22px;height:16px;}
    .r-label{font-size:11px;font-weight:500;white-space:nowrap;}
    .crop-bottom{padding:12px 24px 32px;display:flex;justify-content:center;}
    .crop-back-btn{height:44px;padding:0 36px;background:rgba(255,255,255,.1);border:none;border-radius:12px;color:rgba(255,255,255,.7);font-size:15px;font-family:inherit;cursor:pointer;}

    /* ══ 结果页 ══ */
    #resultPage{flex-direction:column;min-height:100vh;background:#f0f0f0;}
    .result-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;flex-shrink:0;background:#f0f0f0;}
    .result-back{background:none;border:none;color:#8a8a8e;font-size:15px;font-family:inherit;cursor:pointer;padding:6px 4px;}
    .result-title{font-size:15px;font-weight:600;color:#1d1d1f;}
    .result-download-btn{background:none;border:none;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:background .15s;color:#1d1d1f;}
    .result-download-btn:hover{background:rgba(0,0,0,.06);}
    .result-download-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .result-body{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;}
    #resultImg{max-width:100%;max-height:100%;object-fit:contain;border-radius:2px;display:block;}
    .result-hint{display:none;position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:12px;color:#aaa;white-space:nowrap;background:rgba(255,255,255,.85);padding:6px 18px;border-radius:20px;backdrop-filter:blur(8px);}

    /* 保存格式弹窗 */
    .save-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:flex-end;justify-content:center;}
    .save-overlay.show{display:flex;}
    .save-sheet{background:#e8e8e8;border-radius:20px 20px 0 0;padding:24px 24px 44px;width:100%;max-width:500px;animation:slideUp .3s cubic-bezier(.16,1,.3,1) both;}
    @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
    .save-sheet h3{font-size:16px;font-weight:600;color:#1d1d1f;margin-bottom:4px;text-align:center;}
    .save-sheet p{font-size:12px;color:#6e6e73;margin-bottom:20px;text-align:center;}
    .save-btns{display:flex;flex-direction:column;gap:10px;}
    .save-fmt-btn{height:48px;border:none;border-radius:12px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;}
    .save-fmt-btn.png{background:#1d1d1f;color:white;}
    .save-fmt-btn.jpg{background:#d4d4d4;color:#1d1d1f;}
    .save-fmt-btn.cancel-save{background:none;color:#6e6e73;font-size:14px;margin-top:2px;}

    /* Toast */
    .toast{position:fixed;bottom:48px;left:50%;transform:translateX(-50%) translateY(12px);background:#1d1d1f;color:white;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:500;white-space:nowrap;opacity:0;transition:opacity .25s,transform .25s;z-index:9999;pointer-events:none;}
    .toast.success{background:#34c759;}
    .toast.error{background:#ff3b30;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @media(max-width:600px){
      .result-download-btn{display:none;}
      .result-hint{display:block;}
      .result-body{padding:16px 16px 60px;}
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- 登录页 -->
<div class="page active" id="loginPage">
  <div class="login-card">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="账号" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="密码" autocomplete="current-password"/>
    </div>
    <div class="error-msg" id="errorMsg">账号或密码错误，请重试</div>
    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
      <span class="btn-text">Submit</span>
      <div class="spinner"></div>
    </button>
  </div>
</div>

<!-- 首页 -->
<div class="page" id="homePage">
  <div class="home-container">
    <div class="site-name-home">Cleoone26411</div>
    <h1>你的专属<br>穿搭创作台</h1>
    <p>上传服装图片，AI 自动分析<br>自由排版，生成你的穿搭图</p>
    <button class="start-btn" onclick="showPage('workspacePage')">开始创作</button>
  </div>
</div>

<!-- 创作页 -->
<div class="page" id="workspacePage">
  <div class="ws-header"><span class="ws-header-title">Cleoone26411</span></div>
  <div class="ws-body">
    <div class="ws-sidebar">
      <button class="category-btn" onclick="openModal('上装','tops')"><span class="eng">Tops</span> 上装</button>
      <button class="category-btn" onclick="openModal('下装','bottoms')"><span class="eng">Bottoms</span> 下装</button>
      <button class="category-btn" onclick="openModal('鞋子','shoes')"><span class="eng">Shoes</span> 鞋子</button>
      <button class="category-btn" onclick="openModal('袜子','socks')"><span class="eng">Socks</span> 袜子</button>
      <button class="category-btn" onclick="openModal('包包','bags')"><span class="eng">Bags</span> 包包</button>
    </div>
    <div class="ws-right">
      <div class="ws-preview-label">Preview Workspace 预览工作区</div>
      <div class="ws-canvas" id="wsCanvas" onclick="handleCanvasClick(event)">
        <div class="canvas-empty" id="canvasEmpty">上传服装后将在这里显示</div>
        <div class="layer-toolbar" id="layerToolbar">
          <button class="layer-btn" onclick="layerUp()">↑</button>
          <button class="layer-btn" onclick="layerDown()">↓</button>
          <button class="layer-btn" onclick="deleteSelected()">✕</button>
        </div>
      </div>
    </div>
  </div>
  <div class="ws-footer">
    <button class="generate-btn" onclick="generateOutfit()">生成作品</button>
  </div>
  <div class="footer-note">Cleoone26411 · All rights reserved</div>
</div>

<!-- 裁剪页 -->
<div class="page" id="cropPage">
  <div class="crop-topbar">
    <button class="crop-cancel" onclick="showPage('workspacePage')">取消</button>
    <span class="crop-title">裁剪</span>
    <button class="crop-done" onclick="finishCrop()">完成</button>
  </div>
  <div class="crop-stage">
    <div class="crop-img-wrap" id="cropWrap">
      <img id="cropImg" draggable="false"/>
      <div id="cropBox">
        <div class="cc tl"></div><div class="cc tr"></div>
        <div class="cc bl"></div><div class="cc br"></div>
        <div class="cgrid" id="cgrid"></div>
        <div class="ch tl" data-d="tl"></div><div class="ch tr" data-d="tr"></div>
        <div class="ch bl" data-d="bl"></div><div class="ch br" data-d="br"></div>
        <div class="ch tm" data-d="tm"></div><div class="ch bm" data-d="bm"></div>
        <div class="ch ml" data-d="ml"></div><div class="ch mr" data-d="mr"></div>
      </div>
    </div>
  </div>
  <div class="crop-ratios">
    <div class="ratio-row">
      <button class="ratio-btn active" onclick="applyRatio(this,0)"><div class="r-icon free-icon"></div><span class="r-label">自由</span></button>
      <button class="ratio-btn" onclick="applyRatio(this,'orig')"><div class="r-icon sq"></div><span class="r-label">原始</span></button>
      <button class="ratio-btn" onclick="applyRatio(this,1)"><div class="r-icon sq"></div><span class="r-label">1:1</span></button>
      <button class="ratio-btn" onclick="applyRatio(this,9/16)"><div class="r-icon p916"></div><span class="r-label">9:16</span></button>

function addToCanvas(src){

  const tmp=new Image();
  tmp.onload=()=>{

    if(r>1)h=Math.round(w/r);else w=Math.round(h*r);
    const cw=canvas.offsetWidth,ch=canvas.offsetHeight;
    el.style.cssText=`width:${w}px;height:${h}px;left:${Math.max(0,Math.random()*(cw-w-10)+5)}px;top:${Math.max(0,Math.random()*(ch-h-10)+5)}px;z-index:${zCounter++};`;
    el.innerHTML=`<img src="${src}" draggable="false"/>

      <div class="handle bl"></div><div class="handle br"></div>
      <div class="handle tm edge"></div><div class="handle bm edge"></div>
      <div class="handle ml edge"></div><div class="handle mr edge"></div>`;
    makeInteractive(el);canvas.appendChild(el);
  };tmp.src=src;
}

function makeInteractive(el){
  function startDrag(cx,cy){
    selectItem(el);
    const sx=cx-el.offsetLeft,sy=cy-el.offsetTop;
    const cv=document.getElementById('wsCanvas');
    return(ex,ey)=>{
      el.style.left=Math.max(0,Math.min(ex-sx,cv.offsetWidth-el.offsetWidth))+'px';
      el.style.top=Math.max(0,Math.min(ey-sy,cv.offsetHeight-el.offsetHeight))+'px';
    };
  }
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('handle'))return;
    e.preventDefault();const move=startDrag(e.clientX,e.clientY);
    const mv=ev=>move(ev.clientX,ev.clientY);
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
  el.addEventListener('touchstart',e=>{
    if(e.target.classList.contains('handle'))return;
    e.preventDefault();const t=e.touches[0];const move=startDrag(t.clientX,t.clientY);
    const mv=ev=>{ev.preventDefault();const tt=ev.touches[0];move(tt.clientX,tt.clientY);};
    const up=()=>{el.removeEventListener('touchmove',mv);el.removeEventListener('touchend',up);};
    el.addEventListener('touchmove',mv,{passive:false});el.addEventListener('touchend',up);
  },{passive:false});

  el.querySelectorAll('.handle').forEach(h=>{
    const isCorner=!h.classList.contains('edge');
    const d=[...h.classList][1];
    function startResize(cx,cy){
      selectItem(el);
      const sx=cx,sy=cy,sw=el.offsetWidth,sh=el.offsetHeight,sl=el.offsetLeft,st=el.offsetTop,ar=sw/sh;
      return(ex,ey)=>{
        const dx=ex-sx,dy=ey-sy;
        let nw=sw,nh=sh,nl=sl,nt=st;
        if(isCorner){
          if(d==='br'){nw=Math.max(30,sw+dx);nh=Math.round(nw/ar);}
          else if(d==='bl'){nw=Math.max(30,sw-dx);nl=sl+sw-nw;nh=Math.round(nw/ar);}
          else if(d==='tr'){nw=Math.max(30,sw+dx);nh=Math.round(nw/ar);nt=st+sh-nh;}
          else if(d==='tl'){nw=Math.max(30,sw-dx);nl=sl+sw-nw;nh=Math.round(nw/ar);nt=st+sh-nh;}
        } else {
          if(d==='mr'){nw=Math.max(30,sw+dx);}
          else if(d==='ml'){nw=Math.max(30,sw-dx);nl=sl+sw-nw;}
          else if(d==='bm'){nh=Math.max(30,sh+dy);}
          else if(d==='tm'){nh=Math.max(30,sh-dy);nt=st+sh-nh;}
        }
        el.style.width=nw+'px';el.style.height=nh+'px';el.style.left=nl+'px';el.style.top=nt+'px';
      };
    }
    h.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();const move=startResize(e.clientX,e.clientY);
      const mv=ev=>move(ev.clientX,ev.clientY);
      const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
    });
    h.addEventListener('touchstart',e=>{
      e.preventDefault();e.stopPropagation();const t=e.touches[0];const move=startResize(t.clientX,t.clientY);
      const mv=ev=>{ev.preventDefault();const tt=ev.touches[0];move(tt.clientX,tt.clientY);};
      const up=()=>{h.removeEventListener('touchmove',mv);h.removeEventListener('touchend',up);};
      h.addEventListener('touchmove',mv,{passive:false});h.addEventListener('touchend',up);
    },{passive:false});
  });
}

async function generateOutfit(){
  const canvas=document.getElementById('wsCanvas');
  const items=canvas.querySelectorAll('.canvas-item');
  if(!items.length){showToast('请先上传服装图片！','error');return;}
  const prev=selectedItem;deselectAll();
  const displayW=canvas.offsetWidth,displayH=canvas.offsetHeight;
  const pixelW=Math.round(displayW*SCALE),pixelH=Math.round(displayH*SCALE);
  const off=document.createElement('canvas');
  off.width=pixelW;off.height=pixelH;
  const ctx=off.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.scale(SCALE,SCALE);
  ctx.fillStyle='white';ctx.fillRect(0,0,displayW,displayH);
  const sorted=Array.from(items).sort((a,b)=>(parseInt(a.style.zIndex)||0)-(parseInt(b.style.zIndex)||0));
  for(const item of sorted){
    await new Promise(res=>{
      const img=new Image();img.crossOrigin='anonymous';
      img.onload=()=>{
        ctx.drawImage(img,item.offsetLeft,item.offsetTop,item.offsetWidth,item.offsetHeight);
        res();
      };
      img.onerror=res;img.src=item.querySelector('img').src;
    });
  }
  generatedDataUrl=off.toDataURL('image/png');
  origNatW=pixelW;origNatH=pixelH;
  if(prev)selectItem(prev);
  enterCrop();
}

  function moveBox(cx,cy,ox,oy){
    const{w,h}=getCropBox();const iw=img.offsetWidth,ih=img.offsetHeight;
    setCropBox(Math.max(0,Math.min(cx-ox,iw-w)),Math.max(0,Math.min(cy-oy,ih-h)),w,h);
  }
  box.addEventListener('mousedown',e=>{
    if(e.target.dataset.d)return;
    e.preventDefault();grid.classList.add('show');
    const{x,y}=getCropBox();const ox=e.clientX-x,oy=e.clientY-y;
    const mv=ev=>moveBox(ev.clientX,ev.clientY,ox,oy);
    const up=()=>{grid.classList.remove('show');document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
  box.addEventListener('touchstart',e=>{
    if(e.target.dataset.d)return;
    e.preventDefault();grid.classList.add('show');
    const t=e.touches[0];const{x,y}=getCropBox();const ox=t.clientX-x,oy=t.clientY-y;
    const mv=ev=>{ev.preventDefault();const tt=ev.touches[0];moveBox(tt.clientX,tt.clientY,ox,oy);};
    const up=()=>{grid.classList.remove('show');box.removeEventListener('touchmove',mv);box.removeEventListener('touchend',up);};
    box.addEventListener('touchmove',mv,{passive:false});box.addEventListener('touchend',up);
  },{passive:false});
  box.querySelectorAll('.ch').forEach(ch=>{
    function doResize(cx,cy,mx,my,sx0,sy0,sw,sh){
      const d=ch.dataset.d;const dx=cx-mx,dy=cy-my;
      let nx=sx0,ny=sy0,nw=sw,nh=sh;
      const iw=img.offsetWidth,ih=img.offsetHeight;
      if(d==='br'){nw=Math.max(40,sw+dx);nh=calcCH(nw,sh+dy);}
      else if(d==='bl'){nw=Math.max(40,sw-dx);nx=sx0+sw-nw;nh=calcCH(nw,sh+dy);}
      else if(d==='tr'){nw=Math.max(40,sw+dx);nh=calcCH(nw,sh-dy);ny=sy0+sh-nh;}
      else if(d==='tl'){nw=Math.max(40,sw-dx);nx=sx0+sw-nw;nh=calcCH(nw,sh-dy);ny=sy0+sh-nh;}
      else if(d==='mr'){nw=Math.max(40,sw+dx);}
      else if(d==='ml'){nw=Math.max(40,sw-dx);nx=sx0+sw-nw;}
      else if(d==='bm'){nh=Math.max(40,sh+dy);}
      else if(d==='tm'){nh=Math.max(40,sh-dy);ny=sy0+sh-nh;}
      nx=Math.max(0,nx);ny=Math.max(0,ny);nw=Math.min(nw,iw-nx);nh=Math.min(nh,ih-ny);
      setCropBox(nx,ny,nw,nh);
    }
    ch.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();grid.classList.add('show');
      const mx=e.clientX,my=e.clientY;const{x,y,w,h}=getCropBox();
      const mv=ev=>doResize(ev.clientX,ev.clientY,mx,my,x,y,w,h);
      const up=()=>{grid.classList.remove('show');document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
    });
    ch.addEventListener('touchstart',e=>{
      e.preventDefault();e.stopPropagation();grid.classList.add('show');
      const t=e.touches[0];const mx=t.clientX,my=t.clientY;const{x,y,w,h}=getCropBox();
      const mv=ev=>{ev.preventDefault();const tt=ev.touches[0];doResize(tt.clientX,tt.clientY,mx,my,x,y,w,h);};
      const up=()=>{grid.classList.remove('show');ch.removeEventListener('touchmove',mv);ch.removeEventListener('touchend',up);};
      ch.addEventListener('touchmove',mv,{passive:false});ch.addEventListener('touchend',up);
    },{passive:false});
  });
}
function calcCH(nw,rawNh){
  if(activeRatio===0)return Math.max(40,rawNh);
  if(activeRatio==='orig')return Math.round(nw*(origNatH/origNatW));
  return Math.max(40,Math.round(nw/activeRatio));
}
function applyRatio(btn,ratio){
  document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');activeRatio=ratio;
  if(ratio===0)return;
  const img=document.getElementById('cropImg');
  const iw=img.offsetWidth,ih=img.offsetHeight;
  const{x,y,w}=getCropBox();
  let r=ratio==='orig'?(origNatW/origNatH):ratio;
  let nw=w,nh=Math.round(nw/r);
  if(nh>ih){nh=ih;nw=Math.round(nh*r);}
  if(nw>iw){nw=iw;nh=Math.round(nw/r);}
  setCropBox(Math.max(0,Math.min(x,iw-nw)),Math.max(0,Math.min(y,ih-nh)),nw,nh);
}

/* 完成裁剪 → 进入结果页（保持高清） */
function finishCrop(){
  const img=document.getElementById('cropImg');
  const box=document.getElementById('cropBox');
  const scaleX=origNatW/img.offsetWidth;
  const scaleY=origNatH/img.offsetHeight;
  const cx=Math.round(box.offsetLeft*scaleX);
  const cy=Math.round(box.offsetTop*scaleY);
  const cw=Math.round(box.offsetWidth*scaleX);
  const ch=Math.round(box.offsetHeight*scaleY);
  const off=document.createElement('canvas');
  off.width=cw;off.height=ch;
  const ctx=off.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  const src=new Image();
  src.onload=()=>{
    ctx.drawImage(src,cx,cy,cw,ch,0,0,cw,ch);
    croppedDataUrl=off.toDataURL('image/png');
    document.getElementById('resultImg').src=croppedDataUrl;
    showPage('resultPage');
  };
  src.src=generatedDataUrl;
}

/* 下载（电脑） */
function showSaveSheet(){document.getElementById('saveOverlay').classList.add('show');}
function closeSaveSheet(){document.getElementById('saveOverlay').classList.remove('show');}
function doDownload(fmt){
  closeSaveSheet();
  const mime=fmt==='jpg'?'image/jpeg':'image/png';
  const quality=fmt==='jpg'?0.95:undefined;
  const src=new Image();
  src.onload=()=>{
    const off=document.createElement('canvas');
    off.width=src.naturalWidth;off.height=src.naturalHeight;
    const ctx=off.getContext('2d');
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality='high';
    if(fmt==='jpg'){ctx.fillStyle='white';ctx.fillRect(0,0,off.width,off.height);}
    ctx.drawImage(src,0,0);
    off.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=`Cleoone26411_穿搭.${fmt}`;
      document.body.appendChild(a);a.click();
      document.body.removeChild(a);URL.revokeObjectURL(url);
      showToast('✓ 图片已保存到下载文件夹','success');
    },mime,quality);
  };
  src.src=croppedDataUrl;
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginPage').classList.contains('active'))handleLogin();
  if(e.key==='Escape'){closeModal();deselectAll();closeSaveSheet();}
  if((e.key==='Delete'||e.key==='Backspace')&&selectedItem&&!document.getElementById('modalOverlay').classList.contains('show'))deleteSelected();
});
